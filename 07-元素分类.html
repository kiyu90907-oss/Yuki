<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>元素分类</title>
</head>

<body>
  <!-- 块级元素 -->
  <h1>我是h1元素，我是块级元素</h1>
  <p>我是p元素，也是块级元素</p>
  <p>
    <strong>我是strong元素，我可以被其他块级元素包裹，我现在被p元素包裹了</strong>
  </p>
  <!-- 内联元素 -->
  <strong>我是内联元素strong</strong><em>我是内联元素em</em><ins>我也是内联元素ins</ins>我们都是内联元素我们现在都在同一行
  <!-- 特殊情况 -->
</body>

</html>
