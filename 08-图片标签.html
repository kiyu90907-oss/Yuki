<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图片标签</title>
</head>

<body>
  <h2>插入图片</h2>
  <img src="img/树.png" alt="这是一棵树树" width="666">
  <!-- width就是改变图片的宽度 -->
  <h2>改变图片的大小</h2>
  <img src="img/树.png" alt="这是一棵树树" width="300" height="200">
  <!-- height就是改变图片的高度 -->
  <h2>显示图片的title属性</h2>
  <img src="img/树.png" alt="这是一棵树树" width="300" title="这是一棵树树">
  <h2>不同形式的图片</h2>
  <img src="img/橘子洲头.jpg" alt="橘子洲头" width="800" height="412.5">
  <img src="img/ry.jpg" alt="墨染江湖" width="800">
  <!-- 这是最普通的图片形式jpeg格式 -->
  <h2>透明背景的图片</h2>
  <img src="img/透明.png" alt="透明背景" width="500">
  <!-- 这是透明背景的图片 -->
  <h2>动图的图片</h2>
  <img src="img/动图.gif" alt="动图" width="400">
  <!-- 这是动图的图片 -->
  <h2>webp格式的图片</h2>
  <img src="img/Sakura.webp" alt="Sakura" width="600" height="400">
  <img src="img/山海.webp" alt="山海" width="600" height="400">
  <!-- 这是webp格式的图片 -->
  <h2>avif格式的图片</h2>
  <img src="img/zyy.avif" alt="zyy">
  <img src="img/张元英.avif" alt="张元英">
  <!-- 这是avif格式的图片,它是最新的图片格式,它的压缩率最高,它的图片质量最高 -->
  <h2>网络路径</h2>
  <img src="https://haowallpaper.com/link/common/file/previewFileImg/15789130517090624">
  <!-- 这是网络路径的图片 -->
</body>

</html>
