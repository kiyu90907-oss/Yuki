<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>视频和音频</title>
</head>

<body>
  <h2>插入视频</h2>
  <video src="media/fujisan.mp4" controls width="500" autoplay muted loop poster="img/动图.gif"></video>
  <h2>视频属性</h2>
  <p>1. controls：显示视频控件</p>
  <p>2. width：视频宽度</p>
  <p>3. autoplay：自动播放</p>
  <p>4. muted：静音播放</p>
  <p>5. loop：循环播放</p>
  <p>6. poster：视频封面</p>
  <h2>视频属性兼容性写法</h2>
  <video controls width="500">
    <source src="media/fujisan.mp4" type="video/mp4">
    <p>您的浏览器不支持 video 标签。</p>
  </video>
  <h2>插入音频</h2>
  <audio src="media/小半.mp3" controls loop></audio>
  <h2>音频属性</h2>
  <p>1. controls：显示音频控件</p>
  <p>2. loop：循环播放</p>
  <h2>音频属性兼容性写法</h2>
  <audio controls loop>
    <source src="media/小半.mp3" type="audio/mpeg">
    <p>您的浏览器不支持 audio 标签。</p>
  </audio>
</body>

</html>
