<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>网页结构</title>
</head>

<body>
  <h2>网页结构标签</h2>
  <header>网页的头部标签</header>
  <nav>网页的导航标签</nav>
  <main>
    <aside>网页的侧边栏标签</aside>
    <article>网页的主体标签</article>
  </main>
  <footer>网页的底部标签</footer>
  <section>网页的区域快标签</section>

  <h2>div标签和span标签的区别</h2>
  <div>div标签是一个块级元素，用于包裹其他元素，我独占一行</div>
  <div>div标签是一个块级元素，用于包裹其他元素，我独占一行</div>
  <span>span标签是一个行内元素，用于包裹其他元素。</span>
  <span>span标签是一个行内元素，用于包裹其他元素。</span>


</body>

</html>
