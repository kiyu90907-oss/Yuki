<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>表单标签</title>
</head>

<body>
  <h2>表单标签</h2>
  <form action="">
    <!-- action属性是指把收集的信息提交给谁去处理 -->
    <ul>
      <li>
        <label>账号：<input type="text" placeholder="请输入账号" accesskey="s" autocomplete="off"></label>
        <!-- accesskey表示访问键，点击alt+s键可以聚焦到账号输入框 autocomplete表示不记录输入内容 -->
      </li>
      <li>
        <label>密码：<input type="password" placeholder="请输入密码" maxlength="6"></label>
      </li>
      <li>
        <!-- label方式一 -->
        性别
        <input type="radio" value="男" name="gender" checked id="1">
        <label for="1">男</label>
        <input type="radio" value="女" name="gender" id="2">
        <label for="2">女</label>
        <!-- checked表示默认选中 -->
      </li>
      <li>
        <!-- label方式二 -->
        爱好：
        <label><input type="checkbox" value="1" name="hobby">篮球</label>
        <label><input type="checkbox" value="2" name="hobby">足球</label>
        <label><input type="checkbox" value="3" name="hobby" checked>乒乓球</label>
        <!-- checked表示默认选中 -->
      </li>
      <li>
        <label>文件上传：<input type="file" name="file" multiple
            accept=".exe,.docx,.pdf,.jpg,.jpeg,.gif,.png,.image/*"></label>
        <!-- multiple属性表示可以上传多个文件 accept属性表示可以上传的文件类型 -->
      </li>
      <hr>
      <li>
        <label>留言：<textarea name="message" cols="30" rows="10" placeholder="请输入留言"></textarea></label>
        <!-- placeholder属性表示占位符 -->
      </li>
      <li>
        选择您的城市：
        <select name="city">
          <option value="1">北京</option>
          <option value="2">上海</option>
          <option value="3">广州</option>
          <option value="4" selected>深圳</option>
          <!-- selected表示默认选中 -->
        </select>
      </li>
      <li>
        <button disabled>提交</button>
        <!-- disabled表示禁用按钮 -->
      </li>
    </ul>
  </form>
</body>

</html>
