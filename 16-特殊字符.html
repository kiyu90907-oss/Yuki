<body>
  <h2>特殊字符</h2>
  <p>
    &nbsp; 空格符号
    &lt; 小于号
    &gt; 大于号
    &amp; 与号
    &copy; 版权符号
    &reg; 注册商标符号
    &trade; 商标符号
    &euro; 欧元符号
    &pound; 英镑符号
    &yen; 日元符号
    &cent; 分符号
  </p>
  <p>
    你&nbsp;&nbsp;&nbsp;&nbsp;好 2&gt;1 &lt;p&gt;是一个段落标签
  </p>
